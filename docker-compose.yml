services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nenabot-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${FRONTEND_VITE_API_URL:-http://localhost:8000}
        VITE_API_TIMEOUT: ${FRONTEND_VITE_API_TIMEOUT:-30000}
    container_name: nenabot-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped
