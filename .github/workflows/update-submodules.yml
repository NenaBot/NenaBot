name: Update Submodules

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [submodule-updated]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-submodules
  cancel-in-progress: false

jobs:
  update-submodules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
          persist-credentials: false

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure submodule URL auth
        env:
          SUBMODULES_PAT: ${{ secrets.SUBMODULES_PAT }}
        run: |
          TOKEN="${SUBMODULES_PAT}"
          if [ -z "${TOKEN}" ]; then
            echo "::error::SUBMODULES_PAT is required and is not set."
            exit 1
          fi
          echo "Using SUBMODULES_PAT for submodule auth."

          # Use --add so multiple rewrite rules are kept (without --add, later lines overwrite earlier ones).
          git config --global --add url."https://x-access-token:${TOKEN}@github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://x-access-token:${TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

          # Debug output (safe): show configured rewrite keys without token values.
          git config --global --get-regexp '^url\..*\.insteadOf$' | sed -E 's#https://x-access-token:[^@]+@github.com/#https://x-access-token:***@github.com/#'

      - name: Verify submodule access
        shell: bash
        env:
          SUBMODULES_PAT: ${{ secrets.SUBMODULES_PAT }}
        run: |
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0
          TOKEN="${SUBMODULES_PAT}"

          while IFS= read -r key url; do
            [ -z "${url}" ] && continue
            auth_url="${url}"
            auth_url="${auth_url/git@github.com:/https://x-access-token:${TOKEN}@github.com/}"
            auth_url="${auth_url/ssh:\/\/git@github.com\//https://x-access-token:${TOKEN}@github.com/}"
            auth_url="${auth_url/https:\/\/github.com\//https://x-access-token:${TOKEN}@github.com/}"

            safe_url="$(printf '%s' "${auth_url}" | sed -E 's#https://x-access-token:[^@]+@github.com/#https://x-access-token:***@github.com/#')"
            echo "Checking access: ${safe_url}"
            git ls-remote "${auth_url}" -h >/dev/null
          done < <(git config -f .gitmodules --get-regexp '^submodule\..*\.url$')

      - name: Update submodules to latest tracked branch
        shell: bash
        run: |
          set -euo pipefail

          git submodule sync --recursive
          git submodule update --init --recursive

          module_paths=()

          while IFS= read -r module_path; do
            [ -z "$module_path" ] && continue
            module_paths+=("$module_path")

            module_name="$(basename "$module_path")"
            branch="$(git config -f .gitmodules --get "submodule.${module_name}.branch" || true)"
            if [ -z "$branch" ]; then
              branch="main"
            fi

            echo "Updating ${module_path} on branch ${branch}"

            git -C "$module_path" fetch origin "$branch"
            git -C "$module_path" checkout "$branch"
            git -C "$module_path" pull --ff-only origin "$branch"
          done < <(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | awk '{print $2}')

          git add .gitmodules
          git submodule foreach --recursive 'git rev-parse HEAD > /dev/null'
          if [ "${#module_paths[@]}" -gt 0 ]; then
            git add "${module_paths[@]}"
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SUBMODULES_PAT }}
          branch: chore/update-submodule-pointers
          commit-message: "chore(submodules): update frontend and backend pointers"
          title: "chore(submodules): update frontend and backend pointers"
          body: |
            This PR was created automatically by GitHub Actions.

            It updates submodule commit pointers to the latest commits on their tracked branches.

            - Trigger: `${{ github.event_name }}`
            - Workflow: `${{ github.workflow }}`
          labels: |
            dependencies
            automated
          delete-branch: true
