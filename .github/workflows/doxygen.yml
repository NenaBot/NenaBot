name: Generate Doxygen Docs

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  doxygen:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          submodules: false
          fetch-depth: 0

      - name: Configure submodule URL auth
        env:
          SUBMODULES_PAT: ${{ secrets.SUBMODULES_PAT }}
        run: |
          set -euo pipefail
          TOKEN="${SUBMODULES_PAT:-}"
          if [ -z "${TOKEN}" ]; then
            echo "::error::SUBMODULES_PAT is required and is not set."
            exit 1
          fi

          echo "::add-mask::${TOKEN}"
          git config --global --add url."https://x-access-token:${TOKEN}@github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://x-access-token:${TOKEN}@github.com/".insteadOf "ssh://git@github.com/"

      - name: Fetch submodules
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Install Doxygen
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/doxygen/doxygen/releases/download/Release_1_16_1/doxygen-1.16.1.linux.bin.tar.gz" \
            -o /tmp/doxygen.tar.gz
          tar -xzf /tmp/doxygen.tar.gz -C /tmp
          sudo mv /tmp/doxygen-1.16.1/bin/doxygen /usr/local/bin/doxygen
          doxygen --version

      - name: Generate documentation
        run: |
          set -euo pipefail
          doxygen Doxyfile

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: nenabot-docs
          path: docs/generated/html/
          retention-days: 30

      - name: Write job summary
        if: always()
        run: |
          set -euo pipefail
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
            echo "## 📚 Doxygen Documentation"
            echo
            echo "| Item | Value |"
            echo "|---|---|"
            echo "| Artifact | \`nenabot-docs\` |"
            if [ -d docs/generated/html ]; then
              echo "| HTML files | \`$(find docs/generated/html -name '*.html' | wc -l)\` |"
            fi
            echo
            echo "> Triggered by \`${GITHUB_EVENT_NAME}\` on \`${GITHUB_REF_NAME}\` — run [\`${GITHUB_RUN_ID}\`](${run_url})"
          } >> "${GITHUB_STEP_SUMMARY}"
